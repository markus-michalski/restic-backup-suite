name: ShellCheck

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check
        run: find . -name "*.sh" -not -path "*/.git/*" -exec bash -n {} \;

      - name: ShellCheck
        run: find . -name "*.sh" -not -path "*/.git/*" -exec shellcheck {} +
